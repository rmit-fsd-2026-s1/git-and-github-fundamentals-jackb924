<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration</title>

    <link rel="stylesheet" href="registration.css">
</head>
<body>

    <div class="title div"> User Registration</div>

    <div class="form-div">

        <div class="first-name-container">
            <input class="first-name-input" placeholder="First name">
        </div>

        <div class="last-name-container">
            <input class="last-name-input" placeholder="Last name">
        </div>

        <div class="email-container">
            <input class="email-input" placeholder="Email address">
        </div>

        <div class="password-container">
            <input class="password-input" placeholder="Enter a password">
        </div>

        <div class="submit-container">
            <button onclick="submitCheck();" class="submit-button"> Submit</button>
        </div>
        

    </div>

    <script src="registration.js"></script>
    
    
</body>
</html>
